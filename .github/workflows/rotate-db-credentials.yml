name: Rotate Database Credentials

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      database:
        description: "Database to rotate (postgres, mongodb, all)"
        required: true
        default: "all"
        type: choice
        options:
          - postgres
          - mongodb
          - all

env:
  SERVER_HOST: nam.taild248f7.ts.net
  SERVER_USER: nam
  SERVER_DIR: ~/dockerize
  GITHUB_REPO: elorm116/devops-fullstack-cloud

jobs:
  rotate-db-credentials:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_FINGERPRINT: ${{ secrets.SERVER_FINGERPRINT }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SERVER_FINGERPRINT" >> ~/.ssh/known_hosts

      - name: Rotate PostgreSQL Credentials
        if: >-
          github.event_name == 'schedule' ||
          contains(fromJSON('["postgres","all"]'), github.event.inputs.database)
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_ROOT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "${SERVER_USER}@${SERVER_HOST}" \
            bash -s << 'ENDSSH'
            set -euo pipefail

            VAULT_TOKEN="$(cat)"   # <-- securely read from stdin

            echo "==> Rotating PostgreSQL root credentials..."

            curl --silent --fail --show-error \
              --header "X-Vault-Token: $VAULT_TOKEN" \
              --request POST \
              http://127.0.0.1:8200/v1/database/rotate-root/postgres || {
                echo "Failed to rotate PostgreSQL root credentials" >&2
                exit 1
              }

            echo "✅ PostgreSQL root credentials rotated"

            echo "==> Rotating PostgreSQL app user credentials..."

            # Most common endpoint for static/rotated roles (not rotate-role)
            curl --silent --fail --show-error \
              --header "X-Vault-Token: $VAULT_TOKEN" \
              --request POST \
              http://127.0.0.1:8200/v1/database/roles/postgres-app-user/rotate-credentials || {
                echo "Failed to rotate PostgreSQL app credentials" >&2
                exit 1
              }

            echo "✅ PostgreSQL app user credentials rotated"
          ENDSSH <<< "$VAULT_TOKEN"

      - name: Rotate MongoDB Credentials
        if: >-
          github.event_name == 'schedule' ||
          contains(fromJSON('["mongodb","all"]'), github.event.inputs.database)
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_ROOT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "${SERVER_USER}@${SERVER_HOST}" \
            bash -s << 'ENDSSH'
            set -euo pipefail

            VAULT_TOKEN="$(cat)"

            echo "==> Rotating MongoDB root credentials..."

            curl --silent --fail --show-error \
              --header "X-Vault-Token: $VAULT_TOKEN" \
              --request POST \
              http://127.0.0.1:8200/v1/database/rotate-root/mongodb || {
                echo "Failed to rotate MongoDB root credentials" >&2
                exit 1
              }

            echo "✅ MongoDB root credentials rotated"
          ENDSSH <<< "$VAULT_TOKEN"

      - name: Verify Rotation
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_ROOT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "${SERVER_USER}@${SERVER_HOST}" \
            bash -s << 'ENDSSH'
            set -euo pipefail

            VAULT_TOKEN="$(cat)"

            echo "==> Verifying PostgreSQL credentials work..."

            # Assumes Vault has stored the current credentials under this path
            # Adjust path if your config is stored differently
            PG_CREDS=$(curl --silent --fail --header "X-Vault-Token: $VAULT_TOKEN" \
              http://127.0.0.1:8200/v1/database/static-creds/postgres-app-user)

            PG_HOST=$(echo "$PG_CREDS" | jq -r '.data.host')
            PG_USER=$(echo "$PG_CREDS" | jq -r '.data.username')
            PG_PASS=$(echo "$PG_CREDS" | jq -r '.data.password')
            PG_DB=$(echo "$PG_CREDS" | jq -r '.data.database // "postgres"')

            PGPASSWORD="$PG_PASS" psql -h "$PG_HOST" -U "$PG_USER" -d "$PG_DB" \
              -c "SELECT 1;" >/dev/null || {
                echo "PostgreSQL connection test FAILED" >&2
                exit 1
              }
            echo "✅ PostgreSQL connection verified"

            echo "==> Verifying MongoDB credentials work..."

            MONGO_CREDS=$(curl --silent --fail --header "X-Vault-Token: $VAULT_TOKEN" \
              http://127.0.0.1:8200/v1/database/static-creds/mongodb-app-user)

            MONGO_URI=$(echo "$MONGO_CREDS" | jq -r '.data.uri // .data.connection_string')

            mongosh "$MONGO_URI" --eval "db.runCommand({ping: 1})" >/dev/null || {
              echo "MongoDB connection test FAILED" >&2
              exit 1
            }
            echo "✅ MongoDB connection verified"
          ENDSSH <<< "$VAULT_TOKEN"

      - name: Create Audit Log Entry
        if: always()
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_ROOT_TOKEN }}
          ROTATION_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "${SERVER_USER}@${SERVER_HOST}" \
            bash -s << 'ENDSSH'
            set -euo pipefail

            VAULT_TOKEN="$(cat)"

            curl --silent --fail --show-error \
              --header "X-Vault-Token: $VAULT_TOKEN" \
              --header "Content-Type: application/json" \
              --data '{
                "data": {
                  "entry_type": "database_key_rotation",
                  "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
                  "initiated_by": "github-actions",
                  "databases": ["postgres", "mongodb"],
                  "status": "'"$ROTATION_STATUS"'"
                }
              }' \
              http://127.0.0.1:8200/v1/secret/data/audit/db-rotations || {
                echo "Audit log write failed – check Vault" >&2
                exit 1
              }

            echo "Audit entry created"
          ENDSSH <<< "$VAULT_TOKEN"

      - name: Send Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Database Credential Rotation: ${{ job.status }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true