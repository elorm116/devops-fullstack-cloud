name: Rotate Database Credentials

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      database:
        description: "Database to rotate (postgres, mongodb, all)"
        required: true
        default: "all"
        type: choice
        options:
          - postgres
          - mongodb
          - all

env:
  SERVER_HOST: nam.taild248f7.ts.net
  SERVER_USER: nam
  SERVER_DIR: ~/dockerize
  GITHUB_REPO: elorm116/devops-fullstack-cloud

jobs:
  rotate-db-credentials:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_FINGERPRINT: ${{ secrets.SERVER_FINGERPRINT }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SERVER_FINGERPRINT" >> ~/.ssh/known_hosts

      - name: Rotate PostgreSQL Credentials
        if: github.event_name == 'schedule' || github.event.inputs.database == 'postgres' || github.event.inputs.database == 'all'
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_ROOT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "${SERVER_USER}@${SERVER_HOST}" \
            VAULT_TOKEN="$VAULT_TOKEN" \
            bash -s << 'ENDSSH'
            set -euo pipefail

            echo "==> Rotating PostgreSQL root credentials..."

            # Rotate root credentials (database owner)
            curl --silent --fail \
              --header "X-Vault-Token: $VAULT_TOKEN" \
              --request POST \
              http://127.0.0.1:8200/v1/database/rotate-root/postgres

            echo "✅ PostgreSQL root credentials rotated"

            echo "==> Rotating PostgreSQL app user credentials..."

            # App user credentials are rotated via rotate-role, not rotate-root
            curl --silent --fail \
              --header "X-Vault-Token: $VAULT_TOKEN" \
              --request POST \
              http://127.0.0.1:8200/v1/database/rotate-role/postgres-app-user

            echo "✅ PostgreSQL app user credentials rotated"
          ENDSSH

      - name: Rotate MongoDB Credentials
        if: github.event_name == 'schedule' || github.event.inputs.database == 'mongodb' || github.event.inputs.database == 'all'
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_ROOT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "${SERVER_USER}@${SERVER_HOST}" \
            VAULT_TOKEN="$VAULT_TOKEN" \
            bash -s << 'ENDSSH'
            set -euo pipefail

            echo "==> Rotating MongoDB root credentials..."

            curl --silent --fail \
              --header "X-Vault-Token: $VAULT_TOKEN" \
              --request POST \
              http://127.0.0.1:8200/v1/database/rotate-root/mongodb

            echo "✅ MongoDB root credentials rotated"
          ENDSSH

      - name: Verify Rotation
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_ROOT_TOKEN }}
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SERVER_USER}@${SERVER_HOST}" \
            VAULT_TOKEN="$VAULT_TOKEN" \
            bash -s << 'ENDSSH'
            set -euo pipefail

            echo "==> Verifying PostgreSQL connection..."
            curl --silent --fail \
              --header "X-Vault-Token: $VAULT_TOKEN" \
              http://127.0.0.1:8200/v1/database/config/postgres | python3 -c "
import sys, json
data = json.load(sys.stdin)
if data.get('data', {}).get('connection_details'):
    print('✅ PostgreSQL connection verified')
else:
    print('⚠️  PostgreSQL connection details missing', file=sys.stderr)
    sys.exit(1)
"

            echo "==> Verifying MongoDB connection..."
            curl --silent --fail \
              --header "X-Vault-Token: $VAULT_TOKEN" \
              http://127.0.0.1:8200/v1/database/config/mongodb | python3 -c "
import sys, json
data = json.load(sys.stdin)
if data.get('data', {}).get('connection_details'):
    print('✅ MongoDB connection verified')
else:
    print('⚠️  MongoDB connection details missing', file=sys.stderr)
    sys.exit(1)
"
          ENDSSH

      - name: Create Audit Log Entry
        if: always()
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_ROOT_TOKEN }}
          ROTATION_STATUS: ${{ job.status }}
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SERVER_USER}@${SERVER_HOST}" \
            VAULT_TOKEN="$VAULT_TOKEN" \
            ROTATION_STATUS="$ROTATION_STATUS" \
            bash -s << 'ENDSSH'
            curl --silent --request POST \
              --header "X-Vault-Token: $VAULT_TOKEN" \
              --header "Content-Type: application/json" \
              --data "{
                \"data\": {
                  \"entry_type\": \"database_key_rotation\",
                  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
                  \"initiated_by\": \"github-actions\",
                  \"databases\": [\"postgres\", \"mongodb\"],
                  \"status\": \"$ROTATION_STATUS\"
                }
              }" \
              http://127.0.0.1:8200/v1/secret/data/audit/db-rotations \
              || true
          ENDSSH

      - name: Send Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Database Credential Rotation: ${{ job.status }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true