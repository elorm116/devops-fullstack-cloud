name: Rotate Database Credentials

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2 AM UTC
  workflow_dispatch:

env:
  SERVER_HOST: nam.taild248f7.ts.net
  SERVER_USER: nam
  SERVER_DIR: ~/dockerize

jobs:
  rotate-db-credentials:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_FINGERPRINT: ${{ secrets.SERVER_FINGERPRINT }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SERVER_FINGERPRINT" >> ~/.ssh/known_hosts

      - name: Rotate MongoDB Credentials
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$SERVER_USER@$SERVER_HOST" \
            VAULT_TOKEN="$VAULT_TOKEN" \
            bash -s << 'EOSSH'
          set -euo pipefail

          echo "==> Rotating MongoDB blogapi credentials..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --header "X-Vault-Token: $VAULT_TOKEN" \
            --request POST \
            http://127.0.0.1:8200/v1/database/rotate-role/blogapi-static)

          if [ "$RESPONSE" = "204" ]; then
            echo "✅ MongoDB credentials rotated successfully"
          else
            echo "❌ Rotation failed — HTTP $RESPONSE"
            exit 1
          fi
          EOSSH

      - name: Restart API and Verify
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$SERVER_USER@$SERVER_HOST" \
            VAULT_TOKEN="$VAULT_TOKEN" \
            bash -s << 'EOSSH'
          set -euo pipefail

          echo "==> Restarting API container..."
          docker restart api_container

          echo "==> Waiting for API to become healthy..."
          RETRIES=0
          until docker exec api_container wget -qO- http://127.0.0.1:4000/health >/dev/null 2>&1; do
            RETRIES=$((RETRIES + 1))
            if [ "$RETRIES" -ge 20 ]; then
              echo "❌ API did not become healthy in time"
              docker logs api_container 2>&1 | tail -20
              exit 1
            fi
            sleep 3
          done
          echo "✅ API is healthy after rotation"

          echo "==> Verifying new credentials in Vault..."
          CREDS=$(curl -s \
            --header "X-Vault-Token: $VAULT_TOKEN" \
            http://127.0.0.1:8200/v1/database/static-creds/blogapi-static)
          echo "$CREDS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)['data']
          print(f'✅ New credentials active — TTL: {d[\"ttl\"]}s, last rotated: {d[\"last_vault_rotation\"]}')
          "
          EOSSH