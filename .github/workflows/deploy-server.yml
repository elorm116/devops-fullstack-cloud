name: Deploy to Server (Docker Hub)

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (default: latest)"
        required: false
      version:
        description: "Version tag (e.g. v1.2.0) — optional, adds semver tag to images"
        required: false

env:
  DOCKERHUB_USER: elorm116
  SERVER_HOST: nam.taild248f7.ts.net
  SERVER_USER: nam
  SERVER_DIR: ~/dockerize
  FRONTEND_PORT: "3001"
  GRAFANA_PORT: "3002"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      short: ${{ steps.meta.outputs.short }}
      full_sha: ${{ steps.meta.outputs.full_sha }}
      version: ${{ steps.meta.outputs.version }}
      build_date: ${{ steps.meta.outputs.build_date }}
      api_image: ${{ steps.meta.outputs.api_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      api_tags: ${{ steps.meta.outputs.api_tags }}
      fe_tags: ${{ steps.meta.outputs.fe_tags }}
      jenkins_changed: ${{ steps.jenkins_check.outputs.jenkins_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine Metadata
        id: meta
        run: |
          FULL_SHA="${{ github.event.inputs.sha || github.sha }}"
          SHORT_SHA="${FULL_SHA:0:7}"
          VERSION="${{ github.event.inputs.version }}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          API_TAGS="${{ env.DOCKERHUB_USER }}/myjs-app:sha-${SHORT_SHA},${{ env.DOCKERHUB_USER }}/myjs-app:latest"
          FE_TAGS="${{ env.DOCKERHUB_USER }}/myreact-app:sha-${SHORT_SHA},${{ env.DOCKERHUB_USER }}/myreact-app:latest"
          if [[ -n "$VERSION" ]]; then
            SEMVER="${VERSION#v}"
            MINOR="${SEMVER%.*}"
            API_TAGS="${API_TAGS},${{ env.DOCKERHUB_USER }}/myjs-app:${SEMVER},${{ env.DOCKERHUB_USER }}/myjs-app:${MINOR}"
            FE_TAGS="${FE_TAGS},${{ env.DOCKERHUB_USER }}/myreact-app:${SEMVER},${{ env.DOCKERHUB_USER }}/myreact-app:${MINOR}"
          fi
          echo "short=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "full_sha=$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION:-sha-$SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "api_image=${{ env.DOCKERHUB_USER }}/myjs-app:sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ env.DOCKERHUB_USER }}/myreact-app:sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "api_tags=$API_TAGS" >> "$GITHUB_OUTPUT"
          echo "fe_tags=$FE_TAGS" >> "$GITHUB_OUTPUT"

      - name: Check if Dockerfile.jenkins changed
        id: jenkins_check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "Dockerfile.jenkins"; then
            echo "jenkins_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "jenkins_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [api, frontend, jenkins]
        exclude:
          - component: ${{ needs.prepare.outputs.jenkins_changed == 'false' && 'jenkins' || 'none' }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push API
        if: matrix.component == 'api'
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.prepare.outputs.api_tags }}
          build-args: |
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            VCS_REF=${{ needs.prepare.outputs.full_sha }}
            VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend
        if: matrix.component == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ./myblog
          file: ./myblog/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.prepare.outputs.fe_tags }}
          build-args: |
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            VCS_REF=${{ needs.prepare.outputs.full_sha }}
            VERSION=${{ needs.prepare.outputs.version }}
            REACT_APP_GOOGLE_CLIENT_ID=${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Jenkins
        if: matrix.component == 'jenkins'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.jenkins
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKERHUB_USER }}/jenkins-docker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [prepare, build-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://${{ env.SERVER_HOST }}:9000

      - name: Setup SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_FINGERPRINT: ${{ secrets.SERVER_FINGERPRINT }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SERVER_FINGERPRINT" >> ~/.ssh/known_hosts

      - name: Copy configs to server
        run: |
          ssh -i ~/.ssh/id_ed25519 "$SERVER_USER@$SERVER_HOST" "mkdir -p $SERVER_DIR"
          scp -r -i ~/.ssh/id_ed25519 ./monitoring "$SERVER_USER@$SERVER_HOST:$SERVER_DIR/"
          scp -r -i ~/.ssh/id_ed25519 ./scripts "$SERVER_USER@$SERVER_HOST:$SERVER_DIR/"

      - name: Deploy via SSH
        env:
          API_IMAGE: ${{ needs.prepare.outputs.api_image }}
          FRONTEND_IMAGE: ${{ needs.prepare.outputs.frontend_image }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
          MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_APP_PASSWORD: ${{ secrets.MONGO_APP_PASSWORD }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          BLIND_INDEX_PEPPER: ${{ secrets.BLIND_INDEX_PEPPER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$SERVER_USER@$SERVER_HOST" \
            API_IMAGE="$API_IMAGE" \
            FRONTEND_IMAGE="$FRONTEND_IMAGE" \
            SERVER_DIR="$SERVER_DIR" \
            FRONTEND_PORT="$FRONTEND_PORT" \
            GRAFANA_PORT="$GRAFANA_PORT" \
            DOCKERHUB_USER="$DOCKERHUB_USER" \
            DOCKERHUB_TOKEN="$DOCKERHUB_TOKEN" \
            JWT_SECRET="$JWT_SECRET" \
            GRAFANA_ADMIN_USER="$GRAFANA_ADMIN_USER" \
            GRAFANA_ADMIN_PASSWORD="$GRAFANA_ADMIN_PASSWORD" \
            VAULT_ROLE_ID="$VAULT_ROLE_ID" \
            VAULT_SECRET_ID="$VAULT_SECRET_ID" \
            MONGO_ROOT_USER="$MONGO_ROOT_USER" \
            MONGO_ROOT_PASSWORD="$MONGO_ROOT_PASSWORD" \
            MONGO_APP_PASSWORD="$MONGO_APP_PASSWORD" \
            CORS_ORIGIN="$CORS_ORIGIN" \
            GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            BLIND_INDEX_PEPPER="$BLIND_INDEX_PEPPER" \
            bash -s << 'EOSSH'
          set -euo pipefail

          : "${JWT_SECRET:?JWT_SECRET is not set}"
          : "${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is not set}"
          : "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is not set}"
          : "${MONGO_ROOT_USER:?MONGO_ROOT_USER is not set}"
          : "${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is not set}"
          : "${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is not set}"
          : "${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is not set}"
          : "${BLIND_INDEX_PEPPER:?BLIND_INDEX_PEPPER is not set}"
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin
          mkdir -p "$SERVER_DIR" && cd "$SERVER_DIR"

          docker pull "$API_IMAGE"
          docker pull "$FRONTEND_IMAGE"
          docker pull "${DOCKERHUB_USER}/jenkins-docker:latest" || echo "⚠️  jenkins-docker not yet pushed"

          API_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$API_IMAGE")
          FRONTEND_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$FRONTEND_IMAGE")
          JENKINS_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${DOCKERHUB_USER}/jenkins-docker:latest" 2>/dev/null || echo "${DOCKERHUB_USER}/jenkins-docker:latest")

          cat > docker-compose.prod.yaml << EOF
          services:
            db:
              image: mongo:7
              container_name: mongodb
              restart: unless-stopped
              environment:
                - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
                - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
                - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
              volumes:
                - mongo-data:/data/db
                - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
              networks:
                - blog-network

            vault:
              image: hashicorp/vault:1.16
              container_name: vault
              restart: unless-stopped
              cap_add:
                - IPC_LOCK
              environment:
                VAULT_LOCAL_CONFIG: |
                  {
                    "storage": { "file": { "path": "/vault/data" } },
                    "listener": [{ "tcp": { "address": "0.0.0.0:8200", "tls_disable": true } }],
                    "ui": true
                  }
              command: server
              volumes:
                - vault-data:/vault/data
              ports:
                - "8200:8200"
              networks:
                - blog-network

            app:
              image: ${API_DIGEST}
              container_name: api_container
              restart: unless-stopped
              environment:
                - NODE_ENV=production
                - PORT=4000
                - JWT_SECRET=${JWT_SECRET}
                - CORS_ORIGIN=${CORS_ORIGIN}
                - VAULT_ADDR=http://vault:8200
                - VAULT_ROLE_ID=${VAULT_ROLE_ID}
                - VAULT_SECRET_ID=${VAULT_SECRET_ID}
                - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
                - BLIND_INDEX_PEPPER=${BLIND_INDEX_PEPPER}
              depends_on:
                - db
                - vault
              networks:
                - blog-network

            myblog:
              image: ${FRONTEND_DIGEST}
              container_name: myblog_container
              restart: unless-stopped
              ports:
                - "${FRONTEND_PORT}:80"
              depends_on:
                - app
              networks:
                - blog-network

            jenkins:
              image: ${JENKINS_DIGEST}
              container_name: jenkins
              restart: unless-stopped
              ports:
                - "8080:8080"
              volumes:
                - jenkins-data:/var/jenkins_home
                - /var/run/docker.sock:/var/run/docker.sock
              networks:
                - blog-network

            prometheus:
              image: prom/prometheus:v2.51.0
              container_name: prometheus
              restart: unless-stopped
              volumes:
                - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
                - prometheus-data:/prometheus
              networks:
                - blog-network

            grafana:
              image: grafana/grafana:10.4.1
              container_name: grafana
              restart: unless-stopped
              ports:
                - "${GRAFANA_PORT}:3000"
              volumes:
                - grafana-data:/var/lib/grafana
              environment:
                - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
                - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
              networks:
                - blog-network

            sonarqube-db:
              image: postgres:16-alpine
              container_name: sonarqube-db
              restart: unless-stopped
              environment:
                - POSTGRES_USER=sonarqube
                - POSTGRES_PASSWORD=sonarqube
                - POSTGRES_DB=sonarqube
              volumes:
                - sonarqube-db-data:/var/lib/postgresql/data
              networks:
                - blog-network

            sonarqube:
              image: sonarqube:25.12.0.117093-community
              container_name: sonarqube
              restart: unless-stopped
              ports:
                - "9000:9000"
              environment:
                - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonarqube
                - SONAR_JDBC_USERNAME=sonarqube
                - SONAR_JDBC_PASSWORD=sonarqube
              depends_on:
                - sonarqube-db
              networks:
                - blog-network

          volumes:
            mongo-data:
            vault-data:
            prometheus-data:
            grafana-data:
            jenkins-data:
            sonarqube-db-data:
            sonarqube-data:

          networks:
            blog-network:
              driver: bridge
          EOF

          docker compose -f docker-compose.prod.yaml up -d db
          echo "⏳ Waiting for MongoDB..."
          until docker exec mongodb mongosh -u "${MONGO_ROOT_USER}" -p "${MONGO_ROOT_PASSWORD}" --authenticationDatabase admin --quiet --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
            sleep 3
          done

          sudo sysctl -w vm.max_map_count=524288 || true
          docker compose -f docker-compose.prod.yaml up -d --remove-orphans
          docker image prune -f
          EOSSH