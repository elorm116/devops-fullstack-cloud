# ─── SonarQube Configuration (self-hosted) ──────────────────────────────────
# Docs: https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/scanners/sonarscanner/

# Project key — must match the project created in SonarQube UI
sonar.projectKey=dockerize

# Display name shown in the SonarQube dashboard
sonar.projectName=Mali's Blog

# Source directories to analyse (API + Frontend)
sonar.sources=api,myblog/src

# Exclude build artefacts, dependencies, configs, and IaC from analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/monitoring/**,\
  **/k8s/**,\
  **/terraform/**,\
  **/helm/**,\
  **/scripts/**

# Language-specific settings
sonar.javascript.lcov.reportPaths=api/coverage/lcov.info,myblog/coverage/lcov.info
sonar.sourceEncoding=UTF-8
